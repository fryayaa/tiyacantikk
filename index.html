            if (!url) return '';
            const match = url.match(/track\/([a-zA-Z0-9]+)/);

                return `<div class="spotify-player"><iframe src="https://open.spotify.com/embed/track/${match[1]}?utm_source=generator&theme=0" width="100%" height="80" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe></div>`;

            const entryDiv = document.createElement('div');

                    <span class="entry-date">${createdAt}</span>
                </div>
                <p class="entry-message">"${escapeHTML(entry.message)}"</p>
                ${getSpotifyEmbed(entry.song_url)}
            `;
            
            // Masukin ke paling atas list
            entriesContainer.prepend(entryDiv);
        }
