<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send The Song - Clone Version</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #0f0c20, #15102a); margin: 0; padding: 20px; color: #fff; min-height: 100vh; }
        .container { max-width: 600px; margin: 30px auto; background: rgba(255, 255, 255, 0.05); padding: 30px; border-radius: 20px; backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        h1 { text-align: center; font-size: 28px; color: #1DB954; margin-bottom: 5px; font-weight: 800; }
        .subtitle { text-align: center; color: #aaa; font-size: 14px; margin-bottom: 30px; }
        
        form { display: flex; flex-direction: column; gap: 15px; }
        input, textarea { width: 100%; padding: 14px; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; font-size: 14px; box-sizing: border-box; background: rgba(0, 0, 0, 0.3); color: #fff; transition: all 0.3s; }
        input:focus, textarea:focus { border-color: #1DB954; outline: none; background: rgba(0, 0, 0, 0.5); }
        textarea { height: 100px; resize: vertical; }
        
        button { background-color: #1DB954; color: #000; border: none; padding: 14px; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.2s; }
        button:hover { background-color: #1ed760; transform: scale(1.02); }
        button:disabled { background-color: #555; color: #aaa; cursor: not-allowed; }
        
        hr { border: 0; height: 1px; background: rgba(255,255,255,0.1); margin: 35px 0; }
        h2 { font-size: 20px; margin-bottom: 20px; color: #1DB954; text-align: left; }
        
        #wishbox-entries { display: flex; flex-direction: column; gap: 20px; }
        
        /* Card Tampilan ala SendTheSong */
        .entry { background: rgba(255, 255, 255, 0.08); padding: 20px; border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.05); text-align: left; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .entry-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .entry-name { font-weight: 700; color: #1DB954; font-size: 16px; }
        .entry-date { color: #888; font-size: 11px; }
        .entry-message { color: #ddd; font-size: 14px; margin: 0 0 15px 0; line-height: 1.5; word-break: break-word; font-style: italic; background: rgba(0,0,0,0.15); padding: 12px; border-radius: 8px; border-left: 3px solid #1DB954; }
        
        /* Player Spotify Embed */
        .spotify-player { margin-top: 10px; border-radius: 12px; overflow: hidden; background: transparent; }
    </style>
</head>
<body>
    <div class="container">
        <h1>SEND THE SONG 🎵</h1>
        <div class="subtitle">Kirim pesan rahasia beserta lagu favoritmu untuk seseorang</div>

        <form id="wishbox-form">
            <input type="text" id="name" placeholder="Untuk Siapa? (Contoh: Tiya, Adhit, Naufal)" required>
            <textarea id="message" placeholder="Tulis pesan atau harapan rahasiamu di sini..." required></textarea>
            <input type="text" id="song-url" placeholder="Masukkan Link Lagu Spotify (Contoh: https://open.spotify.com/track/...)" required>
            <button type="submit" id="submit-btn">Kirim Pesan & Lagu</button>
        </form>

        <hr>

        <h2>Kumpulan Lagu & Pesan Terpajang 🎧</h2>
        <div id="wishbox-entries">
            <p style="text-align: center; color: #aaa;">Memuat dashboard lagu...</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const SUPABASE_URL = 'https://gcmhpaopnhnaekvlaxpr.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdjbWhwYW9wbmhuYWVrdmxheHByIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTc2NTcyMDAsImV4cCI6MjAzMzIzMzIwMH0.3R3uB-Cg9-yofcK2v_v-tB1o1k3B2_rYgE6O6R3uB-C';

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const wishboxForm = document.getElementById('wishbox-form');
        const nameInput = document.getElementById('name');
        const messageInput = document.getElementById('message');
        const songInput = document.getElementById('song-url');
        const entriesContainer = document.getElementById('wishbox-entries');

        // Mengubah link biasa Spotify menjadi format embed player resmi
        function getSpotifyEmbed(url) {
            if (!url) return '';
            const match = url.match(/track\/([a-zA-Z0-9]+)/);
            if (match && match[1]) {
                return `<div class="spotify-player"><iframe src="https://open.spotify.com/embed/track/${match[1]}?utm_source=generator&theme=0" width="100%" height="80" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe></div>`;
            }
            return `<p style="font-size:12px; color:#ff6b6b;">Link Spotify tidak valid</p>`;
        }

        function displayEntry(entry) {
            const entryDiv = document.createElement('div');
            entryDiv.classList.add('entry');

            const dateObj = entry.created_at ? new Date(entry.created_at) : new Date();
            const createdAt = dateObj.toLocaleString('id-ID', { dateStyle: 'medium', timeStyle: 'short' });

            entryDiv.innerHTML = `
                <div class="entry-header">
                    <span class="entry-name">To: ${escapeHTML(entry.name)}</span>
                    <span class="entry-date">${createdAt}</span>
                </div>
                <p class="entry-message">"${escapeHTML(entry.message)}"</p>
                ${getSpotifyEmbed(entry.song_url)}
            `;
            
            entriesContainer.prepend(entryDiv);
        }

        async function loadEntries() {
            try {
                const { data, error } = await supabase
                    .from('wishbox_entries')
                    .select('*')
                    .order('created_at', { ascending: true });

                if (error) {
                    entriesContainer.innerHTML = '<p style="color: red; text-align: center;">Gagal memuat data.</p>';
                    return;
                }

                entriesContainer.innerHTML = '';
                if (!data || data.length === 0) {
                    entriesContainer.innerHTML = '<p id="no-entry-text" style="text-align: center; color: #aaa;">Belum ada kiriman lagu. Yuk jadi yang pertama!</p>';
                    return;
                }

                data.forEach(displayEntry);
            } catch (err) {
                console.error(err);
            }
        }

        wishboxForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            const name = nameInput.value.trim();
            const message = messageInput.value.trim();
            const song_url = songInput.value.trim();
            const submitBtn = document.getElementById('submit-btn');

            if (!name || !message || !song_url) return;

            submitBtn.disabled = true;
            submitBtn.innerText = 'Mengirim Melodi...';

            const { data, error } = await supabase
                .from('wishbox_entries')
                .insert([{ name, message, song_url }])
                .select(); 

            if (error) {
                console.error(error.message);
                alert('Gagal mengirim, coba cek link Spotify-mu.');
            } else {
                nameInput.value = '';
                messageInput.value = '';
                songInput.value = '';
                
                const placeholder = document.getElementById('no-entry-text');
                if (placeholder) placeholder.remove();
                
                if (data && data.length > 0) {
                    displayEntry(data[0]);
                }
            }

            submitBtn.disabled = false;
            submitBtn.innerText = 'Kirim Pesan & Lagu';
        });

        function escapeHTML(str) {
            if (!str) return '';
            return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
        }

        document.addEventListener('DOMContentLoaded', loadEntries);
    </script>
</body>
</html>
