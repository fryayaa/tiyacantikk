<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Kumpulan Wishes</title>
    <style>
        /* Style Dashboard biar Aesthetic */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 600px; margin: 30px auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { text-align: center; font-size: 26px; color: #111; margin-bottom: 25px; }
        
        /* Desain Form Input */
        form { display: flex; flex-direction: column; gap: 14px; }
        input, textarea { width: 100%; padding: 14px; border: 1px solid #e0e0e0; border-radius: 10px; font-size: 14px; box-sizing: border-box; background-color: #fafafa; transition: all 0.3s; }
        input:focus, textarea:focus { border-color: #007bff; background-color: #fff; outline: none; box-shadow: 0 0 0 3px rgba(0,123,255,0.1); }
        textarea { height: 110px; resize: vertical; }
        button { background-color: #007bff; color: white; border: none; padding: 14px; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button:hover { background-color: #0056b3; }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }
        
        hr { border: 0; height: 1px; background: #eaeaea; margin: 35px 0; }
        h2 { font-size: 20px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        
        /* CONTAINER EMAS: Tempat Kumpulan Ucapan Kepajang */
        #wishbox-entries { display: flex; flex-direction: column; gap: 15px; }
        
        /* Style Card Ucapan di Dashboard */
        .entry { background: #ffffff; padding: 20px; border-radius: 12px; border: 1px solid #eee; box-shadow: 0 4px 6px rgba(0,0,0,0.01); text-align: left; transition: transform 0.2s; }
        .entry:hover { transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,0,0,0.03); }
        .entry-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; border-bottom: 1px dashed #f0f0f0; padding-bottom: 6px; }
        .entry-name { font-weight: 700; color: #007bff; font-size: 15px; }
        .entry-date { color: #aaa; font-size: 11px; }
        .entry-message { color: #444; font-size: 14px; margin: 0; line-height: 1.5; word-break: break-word; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Buku Tamu & Dashboard Wishes ✨</h1>

        <form id="wishbox-form">
            <input type="text" id="name" placeholder="Nama Anda" required>
            <textarea id="message" placeholder="Tulis harapan atau ucapan Anda di sini..." required></textarea>
            <button type="submit" id="submit-btn">Kirim Ucapan</button>
        </form>

        <hr>

        <h2>Kumpulan Wishes Orang-Orang 💬</h2>
        
        <div id="wishbox-entries">
            <p style="text-align: center; color: #888;">Memuat dashboard ucapan...</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const SUPABASE_URL = 'https://gcmhpaopnhnaekvlaxpr.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdjbWhwYW9wbmhuYWVrdmxheHByIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTc2NTcyMDAsImV4cCI6MjAzMzIzMzIwMH0.3R3uB-Cg9-yofcK2v_v-tB1o1k3B2_rYgE6O6R3uB-C';

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const wishboxForm = document.getElementById('wishbox-form');
        const nameInput = document.getElementById('name');
        const messageInput = document.getElementById('message');
        const entriesContainer = document.getElementById('wishbox-entries');

        // 1. CARA KODE MAJANG UCAPAN KE LAYAR
        function displayEntry(entry) {
            const entryDiv = document.createElement('div');
            entryDiv.classList.add('entry');

            // Set format jam & tanggal Indonesia
            const dateObj = entry.created_at ? new Date(entry.created_at) : new Date();
            const createdAt = dateObj.toLocaleString('id-ID', {
                dateStyle: 'medium',
                timeStyle: 'short'
            });

            // Susun struktur kartu ucapan HTML
            entryDiv.innerHTML = `
                <div class="entry-header">
                    <span class="entry-name">👤 ${escapeHTML(entry.name)}</span>
                    <span class="entry-date">📅 ${createdAt}</span>
                </div>
                <p class="entry-message">${escapeHTML(entry.message)}</p>
            `;
            
            // .prepend artinya memasukkan ucapan terbaru di paling atas list dashboard
            entriesContainer.prepend(entryDiv);
        }

        // 2. CARA KODE MENARIK SEMUA DATA BIAR KEPAJANG PAS WEB DIBUKA
        async function loadEntries() {
            try {
                // Ambil semua baris dari tabel wishbox_entries, urutkan dari yang paling lama ke baru (nanti dibalik pas di-prepend)
                const { data, error } = await supabase
                    .from('wishbox_entries')
                    .select('*')
                    .order('created_at', { ascending: true });

                if (error) {
                    console.error(error);
                    entriesContainer.innerHTML = '<p style="color: red; text-align: center;">Gagal memuat kumpulan ucapan.</p>';
                    return;
                }

                entriesContainer.innerHTML = ''; // Bersihkan tulisan "Memuat dashboard..."
                
                if (!data || data.length === 0) {
                    entriesContainer.innerHTML = '<p id="no-entry-text" style="text-align: center; color: #999;">Belum ada ucapan di dashboard. Jadilah yang pertama!</p>';
                    return;
                }

                // Masukkan satu-persatu data dari database ke dalam dashboard HTML
                data.forEach(displayEntry);

            } catch (err) {
                console.error(err);
                entriesContainer.innerHTML = '<p style="color: red; text-align: center;">Terjadi kesalahan sistem.</p>';
            }
        }

        // 3. LOGIKA PAS TOMBOL "KIRIM" DIKLIK
        wishboxForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            const name = nameInput.value.trim();
            const message = messageInput.value.trim();
            const submitBtn = document.getElementById('submit-btn');

            if (!name || !message) return;

            submitBtn.disabled = true;
            submitBtn.innerText = 'Mengirim ke Dashboard...';

            //
